# Cloud Build — AssemblyOps API
#
# Triggered on push to main (configured in GCP Console).
# Builds Docker image, pushes to Artifact Registry, runs database
# migrations against Neon Postgres, then deploys to Cloud Run.
#
# Prerequisites (GCP Console):
#   - Cloud Build service account needs:
#     - Secret Manager Secret Accessor role (roles/secretmanager.secretAccessor)
#   - Secret "DIRECT_URL" in Secret Manager set to the Neon DIRECT (non-pooled)
#     connection string, e.g.:
#     postgresql://<user>:<pwd>@<endpoint>.us-east-1.aws.neon.tech/<db>?sslmode=require

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:latest"
      - "./backend"

  # Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}"

  # Run database migrations directly against Neon
  - name: "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:${SHORT_SHA}"
    entrypoint: "sh"
    dir: "/app"
    args: ["-c", "npx prisma migrate deploy"]
    secretEnv: ["DIRECT_URL"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"

substitutions:
  _REGION: us-east1
  _REPOSITORY: assemblyops
  _IMAGE: assemblyops-api
  _SERVICE: assemblyops-api

availableSecrets:
  secretManager:
    # Run database migrations directly against Neon
    - name: "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:${SHORT_SHA}"
      entrypoint: "sh"
      dir: "/app"
      args: ["-c", "npx prisma migrate deploy"]
      secretEnv: ["DIRECT_URL"]

    # Deploy to Cloud Run
    - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
      entrypoint: gcloud
      args:
        - "run"
        - "deploy"
        - "${_SERVICE}"
        - "--image"
        - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:${SHORT_SHA}"
        - "--region"
        - "${_REGION}"
        - "--platform"
        - "managed"

  substitutions:
    _REGION: us-east1
    _REPOSITORY: assemblyops
    _IMAGE: assemblyops-api
    _SERVICE: assemblyops-api

  availableSecrets:
    secretManager:
      - versionName: projects/${PROJECT_ID}/secrets/DIRECT_URL/versions/latest
        env: "DIRECT_URL"

  options:
    logging: CLOUD_LOGGING_ONLY
