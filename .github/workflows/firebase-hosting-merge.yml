# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

# Deploys each hosting target (web, app, admin) independently to its live channel
# when changes land on main. Only the affected target rebuilds — see the
# detect-changes job for the path filters.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      app: ${{ steps.filter.outputs.app }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:                                       
              - 'web/**'                                                                                                              
              - 'firebase.json'                  
              - '.firebaserc'                                                                                                         
            app:                       
              - 'app/**'                                                                                                              
              - 'shared_ui/**'                                   
              - 'firebase.json'                                                                                                       
              - '.firebaserc'                          
            admin:                                
              - 'admin/**'                       
              - 'shared_ui/**'
              - 'firebase.json'        
              - '.firebaserc'

  deploy-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        working-directory: web
        run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASSEMBLYOPS }}
          channelId: live
          projectId: assemblyops
          target: web

  deploy-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: "stable"
      - name: Build Flutter Web
        working-directory: app
        run: flutter pub get && flutter build web --release
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASSEMBLYOPS }}
          channelId: live
          projectId: assemblyops
          target: app

  deploy-admin:
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: "stable"
      - name: Build Flutter Web
        working-directory: admin
        run: flutter pub get && flutter build web --release
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASSEMBLYOPS }}
          channelId: live
          projectId: assemblyops
          target: admin
